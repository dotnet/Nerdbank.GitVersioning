name: 🎁 Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ship_run_id:
        description: ID of the GitHub workflow run to ship
        required: true
      publish_nuget:
        description: Push NuGet packages
        required: false
        default: true
        type: boolean
      publish_npm:
        description: Push NPM packages
        required: false
        default: true
        type: boolean

run-name: ${{ github.ref_name }}

jobs:
  release:
    runs-on: windows-latest
    environment: Signing
    permissions:
      actions: read # Required to download artifacts
      contents: write # Upload artifacts to Release
      id-token: write # Required for OIDC-based package publishing
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: 🔎 Search for build of ${{ github.ref }}
      shell: pwsh
      id: findrunid
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if ('${{ inputs.ship_run_id }}') {
          $runid = '${{ inputs.ship_run_id }}'
        } else {
          $restApiRoot = '/repos/${{ github.repository }}'

          # Resolve the tag reference to a commit sha
          $resolvedRef = gh api `
            -H "Accept: application/vnd.github+json" `
            -H "X-GitHub-Api-Version: 2022-11-28" `
            $restApiRoot/git/ref/tags/${{ github.ref_name }} `
            | ConvertFrom-Json
          $commitSha = $resolvedRef.object.sha

          Write-Host "Resolved ${{ github.ref_name }} to $commitSha"

          $releases = gh run list -R ${{ github.repository }} -c $commitSha -w .github/workflows/build.yml -s success --json databaseId,startedAt,event,headBranch `
            | ConvertFrom-Json | Sort-Object startedAt -Descending

          $preferredReleases = $releases | Where-Object {
            $_.event -eq 'push' -and ($_.headBranch -eq 'main' -or $_.headBranch -eq 'develop' -or $_.headBranch -match '^v\d+\.\d+$')
          }

          if ($releases.length -eq 0) {
            Write-Error "No successful builds found for ${{ github.ref }}."
          } elseif ($preferredReleases.length -gt 0) {
            if ($releases.length -gt 1) {
              Write-Warning "More than one successful run found for ${{ github.ref }}. Preferring the most recent push build from a public-release branch."
            }

            $runid = $preferredReleases[0].databaseId
          } else {
            if ($releases.length -gt 1) {
              Write-Warning "More than one successful run found for ${{ github.ref }} and none were from a public-release branch. Artifacts from the most recent successful run will ship."
            }

            $runid = $releases[0].databaseId
          }
        }

        Write-Host "Using artifacts from run-id: $runid"

        Echo "runid=$runid" >> $env:GITHUB_OUTPUT

    - name: 🔻 Download deployables artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: deployables-Windows
        path: ${{ runner.temp }}/deployables
        run-id: ${{ steps.findrunid.outputs.runid }}
        github-token: ${{ github.token }}

# Login to Azure using a ServicePrincipal configured to authenticate agaist a GitHub Action
    - name: 🪪 Authorize signing
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      with:
        client-id: ${{ vars.AZURE_CLIENT_ID }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    - name: 🔏 Code sign
      run: >
        rm global.json # avoid a need to install a particular SDK version

        dotnet tool install --tool-path obj --prerelease sign

        obj/sign code azure-key-vault
        '**/*'
        --base-directory '${{ runner.temp }}/deployables'
        --file-list '${{ github.workspace }}/.github/signfiles.txt'
        --azure-key-vault-url "${{ vars.KEY_VAULT_URL }}"
        --azure-key-vault-certificate "${{ vars.KEY_VAULT_CERTIFICATE }}"
        --azure-credential-type azure-cli
      shell: pwsh

    - name: 🪪 Authorize NuGet package push
      uses: NuGet/login@d22cc5f58ff5b88bf9bd452535b4335137e24544 # v1.1.0
      id: nuget-login
      if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_nuget }}
      with:
        user: ${{ secrets.NUGET_USER }}

    - name: 🚀 Push NuGet packages
      if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_nuget }}
      run: dotnet nuget push ${{ runner.temp }}\deployables\*.nupkg --source https://api.nuget.org/v3/index.json -k '${{ steps.nuget-login.outputs.NUGET_API_KEY }}'

    - uses: actions/setup-node@v6
      if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_npm }}
      with:
        node-version: 24
        registry-url: https://registry.npmjs.org

    - name: 🚀 Push NPM packages
      if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_npm }}
      shell: pwsh
      run: |
        Get-ChildItem '${{ runner.temp }}/deployables/*.tgz' |% {
          $packageMetadata = tar -xOf $_.FullName package/package.json | ConvertFrom-Json
          Write-Host "Publishing NPM package $($packageMetadata.name)@$($packageMetadata.version) from $($_.Name)..."

          if ($packageMetadata.version -match '(^|[.-])g[0-9a-f]{7,}$') {
            throw "Refusing to publish non-public package version '$($packageMetadata.version)'. Release publishes must use a public-release build artifact."
          }

          $publishArgs = @($_.FullName, '--registry=https://registry.npmjs.org/')

          if ($packageMetadata.version -match '-(?<prerelease>[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)') {
            $publishTag = $Matches.prerelease.Split('.')[0]
            Write-Host "Detected prerelease version $($packageMetadata.version). Publishing with dist-tag '$publishTag'."
            $publishArgs += "--tag=$publishTag"
          }

          npm publish @publishArgs
        }

    - name: 💽 Upload artifacts to release
      shell: pwsh
      if: ${{ github.event_name == 'release' && github.event.release.assets_url != '' }}
      continue-on-error: true # until we get this to work, be willing to skip it
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        Get-ChildItem '${{ runner.temp }}/deployables' -File -Recurse |% {
          Write-Host "Uploading $($_.Name) to release..."
          gh release -R ${{ github.repository }} upload "${{ github.ref_name }}" $_.FullName
        }
